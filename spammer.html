<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Message Blaster</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --surface: #111;
    --border: #1f1f1f;
    --accent: #00ff88;
    --accent2: #ff3c3c;
    --text: #e0e0e0;
    --muted: #555;
    --glow: 0 0 20px #00ff8855;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* Scanline overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,255,136,0.015) 2px,
      rgba(0,255,136,0.015) 4px
    );
    pointer-events: none;
    z-index: 100;
  }

  /* Noise texture */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 99;
    opacity: 0.3;
  }

  .container {
    width: 480px;
    position: relative;
    z-index: 10;
    animation: fadeIn 0.6s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .header {
    margin-bottom: 32px;
    position: relative;
  }

  .title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 64px;
    letter-spacing: 4px;
    color: var(--accent);
    text-shadow: var(--glow);
    line-height: 1;
  }

  .subtitle {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-top: 4px;
  }

  .corner-mark {
    position: absolute;
    top: 0; right: 0;
    font-size: 10px;
    color: var(--muted);
    letter-spacing: 2px;
  }

  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 28px;
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .field {
    margin-bottom: 20px;
  }

  label {
    display: block;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  input, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 14px;
    padding: 10px 14px;
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    resize: none;
  }

  input:focus, textarea:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 1px var(--accent), var(--glow);
  }

  input[type="number"]::-webkit-inner-spin-button { opacity: 0; }

  .row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .controls {
    display: flex;
    gap: 12px;
    margin-top: 24px;
  }

  .btn {
    flex: 1;
    padding: 12px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 2px;
    border: 1px solid;
    cursor: pointer;
    transition: all 0.15s;
    position: relative;
    overflow: hidden;
  }

  .btn-start {
    background: var(--accent);
    color: var(--bg);
    border-color: var(--accent);
  }

  .btn-start:hover {
    background: transparent;
    color: var(--accent);
    box-shadow: var(--glow);
  }

  .btn-stop {
    background: transparent;
    color: var(--accent2);
    border-color: var(--accent2);
    display: none;
  }

  .btn-stop:hover {
    background: var(--accent2);
    color: var(--bg);
    box-shadow: 0 0 20px #ff3c3c55;
  }

  .btn-reset {
    background: transparent;
    color: var(--muted);
    border-color: var(--border);
    font-size: 14px;
    letter-spacing: 1px;
  }

  .btn-reset:hover {
    border-color: var(--muted);
    color: var(--text);
  }

  /* Status bar */
  .status-bar {
    margin-top: 20px;
    border: 1px solid var(--border);
    padding: 12px 16px;
    background: var(--bg);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .status-dot.active {
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent);
    animation: pulse 1s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .status-text {
    font-size: 12px;
    color: var(--muted);
    flex: 1;
  }

  .status-count {
    font-size: 12px;
    color: var(--accent);
  }

  /* Progress */
  .progress-wrap {
    margin-top: 12px;
    height: 2px;
    background: var(--border);
    position: relative;
    overflow: hidden;
  }

  .progress-bar {
    height: 100%;
    background: var(--accent);
    width: 0%;
    transition: width 0.3s;
    box-shadow: var(--glow);
  }

  /* Output area */
  .output {
    margin-top: 16px;
    background: var(--bg);
    border: 1px solid var(--border);
    height: 140px;
    overflow-y: auto;
    padding: 10px 14px;
    font-size: 12px;
    color: var(--muted);
    scroll-behavior: smooth;
  }

  .output::-webkit-scrollbar { width: 4px; }
  .output::-webkit-scrollbar-track { background: transparent; }
  .output::-webkit-scrollbar-thumb { background: var(--border); }

  .log-line { margin-bottom: 3px; }
  .log-line.sent { color: var(--accent); }
  .log-line.warn { color: var(--accent2); }
  .log-line.info { color: var(--text); }

  /* Delay slider */
  input[type="range"] {
    appearance: none;
    border: none;
    padding: 0;
    height: 2px;
    background: var(--border);
    margin-top: 10px;
    cursor: pointer;
  }

  input[type="range"]::-webkit-slider-thumb {
    appearance: none;
    width: 14px;
    height: 14px;
    background: var(--accent);
    border-radius: 0;
    box-shadow: var(--glow);
  }

  .delay-label {
    display: flex;
    justify-content: space-between;
    margin-top: 6px;
    font-size: 10px;
    color: var(--muted);
  }

  .delay-val { color: var(--accent); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="title">BLASTER</div>
    <div class="subtitle">Auto Message Sender · Web Edition</div>
    <div class="corner-mark">v2.0</div>
  </div>

  <div class="panel">
    <div class="field">
      <label>Mensaje</label>
      <textarea id="msj" rows="3" placeholder="Escribe el mensaje aquí..."> </textarea>
    </div>

    <div class="row">
      <div class="field">
        <label>Número de mensajes</label>
        <input type="number" id="num" value="10" min="1" max="9999">
      </div>
      <div class="field">
        <label>Delay inicial (seg)</label>
        <input type="number" id="delay" value="3" min="0" max="30" step="0.5">
      </div>
    </div>

    <div class="field">
      <label>Velocidad — <span class="delay-val" id="intervalVal">500</span> ms entre mensajes</label>
      <input type="range" id="interval" min="50" max="3000" value="500" step="50">
      <div class="delay-label"><span>Rápido</span><span>Lento</span></div>
    </div>

    <div class="controls">
      <button class="btn btn-start" id="btnStart" onclick="startBlast()">INICIAR</button>
      <button class="btn btn-stop" id="btnStop" onclick="stopBlast()">DETENER</button>
      <button class="btn btn-reset" onclick="resetAll()">RESET</button>
    </div>

    <div class="status-bar">
      <div class="status-dot" id="dot"></div>
      <div class="status-text" id="statusText">Esperando...</div>
      <div class="status-count" id="statusCount"></div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar" id="progressBar"></div>
    </div>

    <div class="output" id="output">
      <div class="log-line info">// Listo para enviar mensajes.</div>
    </div>
  </div>
</div>

<script>
  let timer = null;
  let sent = 0;
  let total = 0;
  let running = false;

  document.getElementById('interval').addEventListener('input', function() {
    document.getElementById('intervalVal').textContent = this.value;
  });

  function log(msg, type = 'info') {
    const out = document.getElementById('output');
    const line = document.createElement('div');
    line.className = 'log-line ' + type;
    line.textContent = msg;
    out.appendChild(line);
    out.scrollTop = out.scrollHeight;
  }

  function setStatus(text, active = false) {
    document.getElementById('statusText').textContent = text;
    document.getElementById('dot').classList.toggle('active', active);
  }

  function updateCount() {
    document.getElementById('statusCount').textContent = `${sent} / ${total}`;
    const pct = total > 0 ? (sent / total) * 100 : 0;
    document.getElementById('progressBar').style.width = pct + '%';
  }

  async function startBlast() {
    const msj = document.getElementById('msj').value;
    total = parseInt(document.getElementById('num').value) || 1;
    const delay = parseFloat(document.getElementById('delay').value) || 3;
    const interval = parseInt(document.getElementById('interval').value) || 500;

    if (!msj.trim()) {
      log('// [ERROR] El mensaje no puede estar vacío.', 'warn');
      return;
    }

    sent = 0;
    running = true;

    document.getElementById('btnStart').style.display = 'none';
    document.getElementById('btnStop').style.display = 'block';
    document.getElementById('output').innerHTML = '';

    setStatus(`Esperando ${delay}s antes de comenzar...`, true);
    log(`// Iniciando en ${delay} segundos...`, 'info');
    updateCount();

    await new Promise(r => setTimeout(r, delay * 1000));

    if (!running) return;

    setStatus('Enviando mensajes...', true);
    log(`// Enviando ${total} mensaje(s) cada ${interval}ms`, 'info');

    timer = setInterval(() => {
      if (!running || sent >= total) {
        clearInterval(timer);
        finish();
        return;
      }

      sent++;
      log(`[${String(sent).padStart(4,'0')}] ${msj}`, 'sent');
      updateCount();

      if (sent >= total) {
        clearInterval(timer);
        finish();
      }
    }, interval);
  }

  function stopBlast() {
    running = false;
    clearInterval(timer);
    setStatus(`Detenido en mensaje ${sent}.`, false);
    log(`// [STOP] Proceso detenido manualmente.`, 'warn');
    document.getElementById('btnStart').style.display = 'block';
    document.getElementById('btnStop').style.display = 'none';
  }

  function finish() {
    running = false;
    setStatus(`Completado. ${sent} mensaje(s) enviados.`, false);
    log(`// [OK] Finalizado. ${sent} mensajes enviados.`, 'info');
    document.getElementById('btnStart').style.display = 'block';
    document.getElementById('btnStop').style.display = 'none';
    document.getElementById('progressBar').style.width = '100%';
  }

  function resetAll() {
    running = false;
    clearInterval(timer);
    sent = 0; total = 0;
    document.getElementById('output').innerHTML = '<div class="log-line info">// Listo para enviar mensajes.</div>';
    document.getElementById('progressBar').style.width = '0%';
    document.getElementById('statusCount').textContent = '';
    document.getElementById('btnStart').style.display = 'block';
    document.getElementById('btnStop').style.display = 'none';
    setStatus('Esperando...', false);
  }
</script>
</body>
</html>
